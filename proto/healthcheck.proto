syntax = "proto3";

package minidrop.healthcheck;

import "hotmethod.proto";

message HealthCheckRequest {
  string hostname = 1;
  string ip_addr = 2;
  string agent_id = 3;
  string agent_version = 4;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
  bool pending = 2;
  minidrop.hotmethod.TaskDesc task_desc = 3;
}

service HealthCheck {
  rpc Do(HealthCheckRequest) returns (HealthCheckResponse);
}
